server {
    listen 80;

    # Health check endpoint the load balancer polls
    location /health {
        return 200 '{"status":"UP","server":"server1"}';
        add_header Content-Type application/json;
    }

    # Echo back which server handled the request
    location / {
        return 200 '{"server":"server1","message":"Hello from Backend 1"}';
        add_header Content-Type application/json;
    }
}
