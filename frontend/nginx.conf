server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and actuator calls to the load balancer backend
    location /api/ {
        proxy_pass http://load-balancer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /actuator/ {
        proxy_pass http://load-balancer:8080;
        proxy_set_header Host $host;
    }

    # React SPA — always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
